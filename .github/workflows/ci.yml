name: CI
on:
  pull_request: {branches: [main]}
  push: {branches: [main]}
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions: {contents: read}
jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env: {POSTGRES_DB: modoroco_test, POSTGRES_USER: modoroco, POSTGRES_PASSWORD: test-only}
        options: >-
          --health-cmd "pg_isready -U modoroco -d modoroco_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
        ports: ["5432:5432"]
    env:
      MODOROCO_ENVIRONMENT: test
      MODOROCO_DATABASE_URL: postgresql+asyncpg://modoroco:test-only@localhost:5432/modoroco_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: {version: "0.8.4", enable-cache: true}
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - run: uv sync --frozen --all-extras --dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run alembic upgrade head
      - run: uv run pytest --cov-report=xml
      - run: uv run python scripts/generate_openapi.py --check
      - run: docker build -t modoroco:test .
      - run: POSTGRES_PASSWORD=test-only docker compose config --quiet

